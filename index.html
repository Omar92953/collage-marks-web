    if (type === 'module') {
      Store.deleteModule(this._params.yearId, this._params.termId, id);
    } else {
      Store.deleteSubject(this._params.yearId, this._params.termId, id);
    }
    await Store.saveAcademics();
    Toast.show('Deleted successfully');
    const term   = Store.getTerm(this._params.yearId, this._params.termId);
    const year   = Store.getYear(this._params.yearId);
    const bounds = Store.getSettings().gradeBoundaries;
    this._renderModules(term, year, bounds);
    this._renderSubjects(term, year, bounds);
    document.getElementById('term-module-count').textContent  = (term.modules  || []).length;
    document.getElementById('term-subject-count').textContent = (term.subjects || []).length;
    const totalUnits = (term.modules || []).length + (term.subjects || []).length;
    const termMarks  = Calculator.termMarks(term);
    const avg        = Calculator.termAverage(term);
    const grade      = Calculator.getGrade(avg, bounds);
    document.getElementById('term-stats-grid').innerHTML = `
      <div class="card stat-card">
        <div class="stat-label">Term Progress</div>
        <div class="stat-value" style="color:var(--color-primary)">${Calculator.fmtAbsolute(termMarks.earned, termMarks.total)}</div>
        <div class="stat-sub">${(term.modules || []).length} module${(term.modules || []).length !== 1 ? 's' : ''}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Grade</div>
        <div style="display:flex;align-items:center;gap:var(--sp-3);margin-top:var(--sp-2);">
          <div class="grade-badge grade-badge-lg ${Calculator.gradeClass(grade)}">${grade}</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Structure</div>
        <div class="stat-value">${totalUnits}</div>
        <div class="stat-sub">${(term.modules || []).length} modules, ${(term.subjects || []).length} subjects</div>
      </div>
    `;
  }
};

/* ── UNIT PAGE CONTROLLER ── */
PageControllers.unit = {
  _params: null,
  _currentUnit: null,

  async init(params) {
    this._params = params;
    const year = Store.getYear(params.yearId);
    if (!year) return;
    const term = Store.getTerm(params.yearId, params.termId);
    if (!term) return;

    let unit = null;
    const type = params.type;

    if (params.moduleId) {
      unit = Store.getNestedSubject(params.yearId, params.termId, params.moduleId, params.id);
    } else if (type === 'module') {
      unit = (term.modules || []).find(m => m.id === params.id);
      if (unit && unit.subjects && unit.subjects.length > 0 && !unit.components) {
        this._renderOldSchemaModuleView(unit, year, term);
        return;
      }
    } else {
      unit = (term.subjects || []).find(s => s.id === params.id);
    }

    if (!unit) return;
    this._currentUnit = unit;

    const bounds = Store.getSettings().gradeBoundaries;
    const marks = Calculator.unitMarks(unit);
    const avg   = Calculator.unitAverage(unit);
    const grade = Calculator.getGrade(avg, bounds);

    const yearLink = document.getElementById('unit-year-link');
    yearLink.textContent = year.label;
    yearLink.href = `#/year/${year.id}`;
    const termLink = document.getElementById('unit-term-link');
    termLink.textContent = term.label;
    termLink.href = `#/year/${year.id}/term/${term.id}`;

    if (params.moduleId) {
      const parentModule = Store.getModule(params.yearId, params.termId, params.moduleId);
      if (parentModule) {
        const sep = termLink.nextElementSibling;
        if (sep) {
          sep.insertAdjacentHTML('afterend',
            `<a href="#/year/${year.id}/term/${term.id}/module/${params.moduleId}">${parentModule.name}</a><span class="sep">›</span>`
          );
        }
      }
    }

    document.getElementById('unit-breadcrumb-label').textContent = unit.name;
    document.getElementById('unit-title').textContent = unit.name;
    document.getElementById('unit-type-badge').textContent = params.moduleId ? 'SUBJECT' : type.toUpperCase();

    document.getElementById('unit-stat-progress').textContent = Calculator.fmtAbsolute(marks.earned, unit.totalMarks);
    const compCount = Object.keys(unit.components || {}).length;
    document.getElementById('unit-stat-count').textContent = `${compCount} assessment${compCount !== 1 ? 's' : ''}`;
    document.getElementById('unit-stat-grade').textContent = grade;
    document.getElementById('unit-stat-grade').className = `grade-badge grade-badge-lg ${Calculator.gradeClass(grade)}`;

    this._updateRemainingIndicator(unit);
    this._renderGradeZone(Calculator.gradeZone(unit, bounds), bounds, unit);
    this._initDirectMarkToggle(unit);
    this._renderComponents(unit);

    document.getElementById('unit-edit-btn').addEventListener('click', () => {
      const editType = params.moduleId ? 'subject' : type;
      Modal.open(`Edit ${editType.charAt(0).toUpperCase() + editType.slice(1)}`, `
        <div class="input-group">
          <label>Name</label>
          <input id="modal-unit-name" class="input" type="text" value="${unit.name}" />
        </div>
        <div class="input-group">
          <label>Total Marks</label>
          <input id="modal-unit-total" class="input" type="number" inputmode="decimal" value="${unit.totalMarks}" min="1" />
        </div>
        <p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--sp-2);">
          Updating Total Marks will rescale the pre-built assessment components (20/30/40/10).
        </p>
        <div style="margin-top:var(--sp-4);padding-top:var(--sp-4);border-top:1px solid var(--border);">
          <button class="btn btn-danger" style="width:100%" onclick="PageControllers.unit.deleteCurrentUnit()">Delete ${editType}</button>
        </div>
      `, 'Save', async () => {
        const name = document.getElementById('modal-unit-name').value.trim();
        const total = parseFloat(document.getElementById('modal-unit-total').value);
        if (!name || isNaN(total)) return;
        unit.name = name;
        unit.totalMarks = total;
        Store.recalculateDefaultComponents(unit);
        await Store.saveAcademics();
        Modal.close();
        Toast.show(`${editType} updated`);
        Router.handle(location.hash);
      });
    });

    document.getElementById('unit-add-exam-btn').addEventListener('click', () => {
      Modal.open('Add Custom Assessment', `
        <div class="input-group">
          <label>Label</label>
          <input id="modal-exam-label" class="input" type="text" placeholder="e.g. Midterm 1" />
        </div>
        <div class="input-group">
          <label>Total Marks</label>
          <input id="modal-exam-total" class="input" type="number" inputmode="decimal" value="10" />
        </div>
        <div class="input-group">
          <label>Obtained Mark <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <input id="modal-exam-mark" class="input" type="number" inputmode="decimal" step="0.5" placeholder="Leave blank if not taken yet" />
        </div>
        <div class="input-group">
          <label>Exam Date</label>
          <input id="modal-exam-date" class="input" type="date" />
        </div>
      `, 'Add Assessment', async () => {
        const label   = document.getElementById('modal-exam-label').value.trim();
        const total   = parseFloat(document.getElementById('modal-exam-total').value);
        const markStr = document.getElementById('modal-exam-mark').value;
        const date    = document.getElementById('modal-exam-date').value;
        if (!label || isNaN(total)) return;
        const parsedMark = markStr === '' ? null : parseFloat(markStr);
        if (parsedMark !== null && parsedMark > total) {
          const markInput = document.getElementById('modal-exam-mark');
          if (markInput) { markInput.style.borderColor = 'var(--color-danger)'; markInput.focus(); }
          Toast.show(`Mark cannot exceed total (${total})`, 'error');
          return;
        }
        if (!unit.components) unit.components = {};
        const key = 'custom_' + Date.now();
        unit.components[key] = { label, mark: parsedMark, totalMarks: total, examDate: date || null };
        await Store.saveAcademics();
        Modal.close();
        Toast.show('Assessment added');
        Router.handle(location.hash);
      });
    });
  },

  _renderOldSchemaModuleView(module, year, term) {
    const bounds = Store.getSettings().gradeBoundaries;
    const marks = Calculator.unitMarks(module);
    const avg = Calculator.unitAverage(module);
    const grade = Calculator.getGrade(avg, bounds);
    document.getElementById('unit-year-link').textContent = year.label;
    document.getElementById('unit-year-link').href = `#/year/${year.id}`;
    document.getElementById('unit-term-link').textContent = term.label;
    document.getElementById('unit-term-link').href = `#/year/${year.id}/term/${term.id}`;
    document.getElementById('unit-breadcrumb-label').textContent = module.name;
    document.getElementById('unit-title').textContent = module.name;
    document.getElementById('unit-type-badge').textContent = 'MODULE';
    document.getElementById('unit-stat-progress').textContent = Calculator.fmtAbsolute(marks.earned, module.totalMarks);
    const subjCount = (module.subjects || []).length;
    document.getElementById('unit-stat-count').textContent = `${subjCount} subject${subjCount !== 1 ? 's' : ''}`;
    document.getElementById('unit-stat-grade').textContent = grade;
    document.getElementById('unit-stat-grade').className = `grade-badge grade-badge-lg ${Calculator.gradeClass(grade)}`;
    const indicator = document.getElementById('unit-remaining-indicator');
    if (indicator) {
      const subjTotal = (module.subjects || []).reduce((s, subj) => s + (subj.totalMarks || 0), 0);
      const diff = (module.totalMarks || 0) - subjTotal;
      if (diff === 0) { indicator.textContent = 'Subject totals match ✓'; indicator.style.color = 'var(--color-success)'; }
      else { indicator.textContent = `${subjTotal} / ${module.totalMarks} marks in subjects`; indicator.style.color = 'var(--text-secondary)'; }
    }
    const header = document.querySelector('#unit-page .section-header h3');
    if (header) header.textContent = 'Subjects';
    const list = document.getElementById('unit-components-list');
    if (!list) return;
    if (!module.subjects || module.subjects.length === 0) {
      list.innerHTML = `<div class="empty-compact" style="padding:var(--sp-5);">No subjects in this module.</div>`;
    } else {
      list.innerHTML = module.subjects.map(subj => {
        const sm = Calculator.unitMarks(subj);
        const sa = Calculator.unitAverage(subj);
        const sg = Calculator.getGrade(sa, bounds);
        const pct = sa !== null ? sa.toFixed(1) + '%' : '--';
        return `
          <div class="component-row card-clickable"
               onclick="Router.navigate('#/year/${year.id}/term/${term.id}/module/${module.id}/subject/${subj.id}')">
            <div class="component-info">
               <div class="component-label">${subj.name}</div>
               <div class="component-meta"><span class="grade-badge grade-badge-sm ${Calculator.gradeClass(sg)}">${sg}</span></div>
            </div>
            <div class="component-score">
              <div class="score-value">${sm.earned} / ${subj.totalMarks || sm.total}</div>
              <div class="score-pct">${pct}</div>
            </div>
          </div>`;
      }).join('');
    }
    const addExamBtn = document.getElementById('unit-add-exam-btn');
    if (addExamBtn) addExamBtn.style.display = 'none';
    document.getElementById('unit-edit-btn').addEventListener('click', () => {
      Modal.open('Edit Module', `
        <div class="input-group">
          <label>Name</label>
          <input id="modal-unit-name" class="input" type="text" value="${module.name}" />
        </div>
        <div class="input-group">
          <label>Total Marks</label>
          <input id="modal-unit-total" class="input" type="number" inputmode="decimal" value="${module.totalMarks || 0}" min="1" />
        </div>
        <div style="margin-top:var(--sp-4);padding-top:var(--sp-4);border-top:1px solid var(--border);">
          <button class="btn btn-danger" style="width:100%" onclick="PageControllers.unit.deleteCurrentUnit()">Delete Module</button>
        </div>
      `, 'Save', async () => {
        const name = document.getElementById('modal-unit-name').value.trim();
        const total = parseFloat(document.getElementById('modal-unit-total').value);
        if (!name || isNaN(total)) return;
        module.name = name; module.totalMarks = total;
        await Store.saveAcademics(); Modal.close(); Toast.show('Module updated'); Router.handle(location.hash);
      });
    });
  },

  _renderComponents(unit) {
    const list = document.getElementById('unit-components-list');
    if (!list) return;
    const components = unit.components || {};
    if (Object.keys(components).length === 0) {
      list.innerHTML = `<div class="empty-compact" style="padding:var(--sp-5);">No components added.</div>`;
      return;
    }
    list.innerHTML = Object.entries(components).map(([key, comp]) => {
      const pct = comp.mark !== null ? ((comp.mark / comp.totalMarks) * 100).toFixed(1) + '%' : '--';
      const displayLabel = comp.label || key;
      return `
        <div class="component-row card-clickable" onclick="PageControllers.unit.editComponent('${key}')">
          <div class="component-info">
             <div class="component-label">${displayLabel}</div>
             <div class="component-meta">
               ${comp.isActivity ? '<span class="badge badge-accent">ACTIVITY</span>' : (comp.examDate ? `📅 ${comp.examDate}` : 'No date set')}
             </div>
          </div>
          <div class="component-score">
            <div class="score-value">${comp.mark !== null ? comp.mark : '--'} / ${comp.totalMarks}</div>
            <div class="score-pct">${pct}</div>
          </div>
        </div>`;
    }).join('');
  },

  editComponent(key) {
    const { yearId, termId, type, id, moduleId } = this._params;
    let unit;
    if (moduleId) {
      unit = Store.getNestedSubject(yearId, termId, moduleId, id);
    } else {
      const term = Store.getTerm(yearId, termId);
      if (!term) return;
      unit = type === 'module' ? (term.modules || []).find(m => m.id === id) : (term.subjects || []).find(s => s.id === id);
    }
    if (!unit || !unit.components) return;
    const comp = unit.components[key];
    if (!comp) return;
    const isCustom = key.startsWith('custom_');
    const displayLabel = comp.label || key;
    Modal.open(`Edit: ${displayLabel}`, `
      <div class="input-group">
        <label>Label</label>
        <input id="modal-comp-label" class="input" type="text" value="${comp.label || ''}" />
      </div>
      <div class="input-group">
        <label>Earned Mark</label>
        <input id="modal-comp-mark" class="input" type="number" inputmode="decimal" step="0.5" value="${comp.mark !== null && comp.mark !== undefined ? comp.mark : ''}" placeholder="Not entered" />
      </div>
      <div class="input-group">
        <label>Total Marks Available</label>
        <input id="modal-comp-total" class="input" type="number" inputmode="decimal" value="${comp.totalMarks}" />
      </div>
      ${!comp.isActivity ? `
      <div class="input-group">
        <label>Exam Date</label>
        <input id="modal-comp-date" class="input" type="date" value="${comp.examDate || ''}" />
      </div>` : ''}
      ${isCustom ? `
      <div style="margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--border);">
        <button class="btn btn-danger btn-sm" onclick="PageControllers.unit._deleteComponent('${key}')">Delete Assessment</button>
      </div>` : ''}
    `, 'Save', async () => {
      const label = document.getElementById('modal-comp-label').value.trim();
      const markStr = document.getElementById('modal-comp-mark').value;
      const total = parseFloat(document.getElementById('modal-comp-total').value);
      if (!label || isNaN(total)) return;
      const parsedMark = markStr === '' ? null : parseFloat(markStr);
      if (parsedMark !== null && parsedMark > total) {
        const markInput = document.getElementById('modal-comp-mark');
        if (markInput) { markInput.style.borderColor = 'var(--color-danger)'; markInput.focus(); }
        Toast.show(`Mark cannot exceed total (${total})`, 'error');
        return;
      }
      comp.label = label; comp.mark = parsedMark; comp.totalMarks = total;
      if (!comp.isActivity) {
        const dateEl = document.getElementById('modal-comp-date');
        if (dateEl) comp.examDate = dateEl.value || null;
      }
      await Store.saveAcademics(); Modal.close(); Toast.show('Saved'); Router.handle(location.hash);
    });
  },

  async _deleteComponent(key) {
    const { yearId, termId, type, id, moduleId } = this._params;
    let unit;
    if (moduleId) {
      unit = Store.getNestedSubject(yearId, termId, moduleId, id);
    } else {
      const term = Store.getTerm(yearId, termId);
      if (!term) return;
      unit = type === 'module' ? (term.modules || []).find(m => m.id === id) : (term.subjects || []).find(s => s.id === id);
    }
    if (!unit || !unit.components) return;
    delete unit.components[key];
    await Store.saveAcademics(); Modal.close(); Toast.show('Assessment deleted'); Router.handle(location.hash);
  },

  async deleteCurrentUnit() {
    if (!confirm('Are you certain you want to delete this? This action cannot be reversed.')) return;
    const { yearId, termId, type, id, moduleId } = this._params;
    if (moduleId) {
      const mod = Store.getModule(yearId, termId, moduleId);
      if (mod && mod.subjects) mod.subjects = mod.subjects.filter(s => s.id !== id);
    } else {
      if (type === 'module') Store.deleteModule(yearId, termId, id);
      else Store.deleteSubject(yearId, termId, id);
    }
    await Store.saveAcademics(); Modal.close(); Toast.show('Deleted successfully');
    if (moduleId) Router.navigate('#/year/' + yearId + '/term/' + termId + '/module/' + moduleId);
    else Router.navigate('#/year/' + yearId + '/term/' + termId);
  },

  _initDirectMarkToggle(unit) {
    const btn = document.getElementById('unit-direct-toggle-btn');
    if (!btn) return;
    const isDirectMode = unit.directMark !== null && unit.directMark !== undefined;
    if (isDirectMode) btn.classList.add('active');
    btn.addEventListener('click', () => {
      if (unit.directMark !== null && unit.directMark !== undefined) {
        Modal.open('Edit Direct Mark', `
          <div class="input-group">
            <label>Marks Earned (out of ${unit.totalMarks})</label>
            <input id="modal-direct-mark" class="input" type="number" inputmode="decimal" step="0.5" min="0" max="${unit.totalMarks}" value="${unit.directMark}" />
          </div>
          <div style="margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--border);">
            <button class="btn btn-danger btn-sm" onclick="
              delete PageControllers.unit._currentUnit.directMark;
              Store.recalculateDefaultComponents(PageControllers.unit._currentUnit);
              Store.saveAcademics().then(() => { Modal.close(); Router.handle(location.hash); });
            ">Clear &amp; Switch to Components</button>
          </div>
        `, 'Save', async () => {
          const val = parseFloat(document.getElementById('modal-direct-mark').value);
          if (isNaN(val) || val < 0) return;
          if (val > unit.totalMarks) {
            const inp = document.getElementById('modal-direct-mark');
            if (inp) { inp.style.borderColor = 'var(--color-danger)'; inp.focus(); }
            Toast.show(`Mark cannot exceed total (${unit.totalMarks})`, 'error');
            return;
          }
          unit.directMark = val; await Store.saveAcademics(); Modal.close(); Router.handle(location.hash);
        });
      } else {
        Modal.open('Enter Direct Mark', `
          <p style="color:var(--text-muted);font-size:var(--text-sm);">
            Enter the total marks you earned for this unit. Individual assessment breakdown will be hidden.
          </p>
          <div class="input-group">
            <label>Marks Earned (out of ${unit.totalMarks})</label>
            <input id="modal-direct-mark" class="input" type="number" inputmode="decimal" step="0.5" min="0" max="${unit.totalMarks}" placeholder="e.g. 78" />
          </div>
        `, 'Save', async () => {
          const val = parseFloat(document.getElementById('modal-direct-mark').value);
          if (isNaN(val) || val < 0) return;
          unit.directMark = Math.min(val, unit.totalMarks);
          await Store.saveAcademics(); Modal.close(); Router.handle(location.hash);
        });
      }
    });
  },

  _renderGradeZone(gz, bounds, unit) {
    const card = document.getElementById('unit-grade-zone-card');
    if (!card || !gz) { if (card) card.style.display = 'none'; return; }
    card.style.display = 'block';
    if (gz.mode === 'direct') {
      const marginLine = gz.safetyMargin !== null
        ? `<span style="color:var(--text-muted);font-size:var(--text-sm);">${gz.safetyMargin.toFixed(1)}% above ${gz.currentGrade} threshold</span>`
        : '';
      card.innerHTML = `
        <div style="padding:var(--sp-4) var(--sp-5);">
          <div style="display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;">
            <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);">Direct Mark</div>
            <div class="grade-badge grade-badge-sm ${Calculator.gradeClass(gz.currentGrade)}">${gz.currentGrade}</div>
            <div style="font-weight:600;">${gz.scoredPct.toFixed(1)}% — ${unit.directMark} / ${unit.totalMarks}</div>
            ${marginLine}
          </div>
        </div>`;
      return;
    }
    const topGrade = gz.bestAchievableGrade;
    const earnedPct = (gz.earnedSoFar != null && unit.totalMarks)
      ? ((gz.earnedSoFar / unit.totalMarks) * 100).toFixed(1) + '%' : '--';

    const gradeRows = [
      { grade: 'A', boundary: bounds.A, achievable: gz.aAchievable, safeDrop: gz.safeDropForA, color: 'var(--color-success)' },
      { grade: 'B', boundary: bounds.B, achievable: gz.bAchievable, safeDrop: gz.safeDropForB, color: 'var(--text-primary)' },
      { grade: 'C', boundary: bounds.C, achievable: gz.cAchievable, safeDrop: gz.safeDropForC, color: 'var(--color-warning)' },
    ];

    const gradeTableHTML = gradeRows.map(r => {
      if (r.achievable) {
        return `
          <div style="display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) 0;border-bottom:1px solid var(--border-light);">
            <div class="grade-badge grade-badge-sm ${Calculator.gradeClass(r.grade)}" style="flex-shrink:0;">${r.grade}</div>
            <div style="flex:1;font-size:var(--text-sm);">≥${r.boundary}% &nbsp;·&nbsp; <span style="color:${r.color};font-weight:600;">drop up to ${r.safeDrop} mark${r.safeDrop !== 1 ? 's' : ''}</span></div>
            <div style="font-size:var(--text-xs);color:var(--color-success);font-weight:600;">✓</div>
          </div>`;
      } else {
        const needed = Math.ceil((r.boundary / 100) * unit.totalMarks - gz.maxPossible);
        return `
          <div style="display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) 0;border-bottom:1px solid var(--border-light);opacity:.45;">
            <div class="grade-badge grade-badge-sm grade-none" style="flex-shrink:0;">${r.grade}</div>
            <div style="flex:1;font-size:var(--text-sm);">≥${r.boundary}% &nbsp;·&nbsp; short by ${needed} mark${needed !== 1 ? 's' : ''}</div>
            <div style="font-size:var(--text-xs);color:var(--color-danger);font-weight:600;">✗</div>
          </div>`;
      }
    }).join('');

    const simId    = 'gz-sim-' + unit.id;
    const simOutId = 'gz-out-' + unit.id;

    card.innerHTML = `
      <div style="padding:var(--sp-4) var(--sp-5);">
        <div style="display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-4);">
          <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);">Grade Zone</div>
          <div class="grade-badge grade-badge-sm ${Calculator.gradeClass(topGrade)}">${topGrade} max</div>
        </div>
        ${gradeTableHTML}
        <div style="display:flex;gap:var(--sp-5);margin-top:var(--sp-3);font-size:var(--text-xs);color:var(--text-muted);flex-wrap:wrap;">
          <span>Earned: ${gz.earnedSoFar} / ${unit.totalMarks} (${earnedPct})</span>
          <span>Remaining: ${gz.remainingMarks} marks ungraded</span>
          <span>Max: ${gz.maxPossible} (${gz.maxPct.toFixed(1)}%)</span>
        </div>
        <div style="margin-top:var(--sp-4);padding-top:var(--sp-4);border-top:1px solid var(--border);">
          <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:var(--sp-3);">Mark Simulator</div>
          <div style="display:flex;align-items:center;gap:var(--sp-3);">
            <span style="font-size:var(--text-sm);color:var(--text-secondary);white-space:nowrap;flex-shrink:0;">Lose</span>
            <input id="${simId}" type="range" min="0" max="${gz.remainingMarks}" value="0"
                   style="flex:1;accent-color:var(--color-primary);" />
            <span id="${simId}-val" style="font-size:var(--text-sm);font-weight:700;min-width:64px;text-align:right;flex-shrink:0;">0 marks</span>
          </div>
          <div id="${simOutId}" style="margin-top:var(--sp-3);padding:var(--sp-3) var(--sp-4);background:var(--bg-surface-2);border-radius:var(--radius-md);font-size:var(--text-sm);min-height:36px;"></div>
        </div>
      </div>`;

    const slider = document.getElementById(simId);
    const simVal = document.getElementById(simId + '-val');
    const simOut = document.getElementById(simOutId);
    const runSim = () => {
      const lost   = parseInt(slider.value, 10);
      const scored = gz.earnedSoFar + (gz.remainingMarks - lost);
      const pct    = unit.totalMarks ? (scored / unit.totalMarks) * 100 : 0;
      const grade  = Calculator.getGrade(pct, bounds);
      const col    = grade === 'A' ? 'var(--color-success)' : grade === 'B' ? 'var(--text-primary)' : grade === 'C' ? 'var(--color-warning)' : 'var(--color-danger)';
      simVal.textContent = `${lost} mark${lost !== 1 ? 's' : ''}`;
      simOut.innerHTML   = `Score <strong>${scored % 1 === 0 ? scored : scored.toFixed(1)} / ${unit.totalMarks}</strong> &nbsp;·&nbsp; <strong>${pct.toFixed(1)}%</strong> &nbsp;·&nbsp; Grade: <strong style="color:${col};font-size:var(--text-lg);">${grade}</strong>`;
    };
    runSim();
    slider.addEventListener('input', runSim);
  },

  _updateRemainingIndicator(unit) {
    const indicator = document.getElementById('unit-remaining-indicator');
    if (!indicator) return;
    const totalAllocated = Object.values(unit.components || {}).reduce((s, c) => s + (c.totalMarks || 0), 0);
    const remaining = (unit.totalMarks || 0) - totalAllocated;
    if (remaining === 0) { indicator.textContent = 'All marks allocated ✓'; indicator.style.color = 'var(--color-success)'; }
    else if (remaining > 0) { indicator.textContent = `${remaining} marks left for more exams`; indicator.style.color = 'var(--text-secondary)'; }
    else { indicator.textContent = `${Math.abs(remaining)} marks over-allocated!`; indicator.style.color = 'var(--color-danger)'; }
  }
};

/* ── SETTINGS PAGE CONTROLLER ── */
PageControllers.settings = {
  async init() {
    const user     = Store.getUser();
    const settings = Store.getSettings();
    const bounds   = settings.gradeBoundaries;

    const nameInput   = document.getElementById('settings-name-input');
    const nameSaveBtn = document.getElementById('settings-name-save-btn');
    if (nameInput) nameInput.value = user.name || '';
    if (nameSaveBtn) {
      nameSaveBtn.addEventListener('click', async () => {
        const name = nameInput.value.trim();
        if (!name) return;
        await Store.setUserName(name);
        Toast.show('Name updated');
      });
    }

    const darkToggle = document.getElementById('settings-dark-toggle');
    if (darkToggle) {
      darkToggle.checked = settings.theme === 'dark';
      darkToggle.addEventListener('change', async () => {
        const next = await Theme.toggle();
        Toast.show(`Switched to ${next} mode`, 'info');
      });
    }

    this._renderGradeBoundaries(bounds);
    document.getElementById('settings-grades-save-btn').addEventListener('click', async () => {
      const aVal = parseFloat(document.getElementById('boundary-A').value);
      const bVal = parseFloat(document.getElementById('boundary-B').value);
      const cVal = parseFloat(document.getElementById('boundary-C').value);
      if (isNaN(aVal) || isNaN(bVal) || isNaN(cVal)) { Toast.show('Please enter valid numbers', 'error'); return; }
      if (aVal <= bVal || bVal <= cVal) { Toast.show('Grades must be in descending order (A > B > C)', 'error'); return; }
      settings.gradeBoundaries.A = aVal;
      settings.gradeBoundaries.B = bVal;
      settings.gradeBoundaries.C = cVal;
      await Store.saveSettings();
      Toast.show('Grade boundaries saved');
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const tabEl = document.getElementById(`tab-${btn.dataset.tab}`);
        if (tabEl) tabEl.classList.add('active');
      });
    });

    this._renderYearsList();

    document.getElementById('add-year-btn').addEventListener('click', () => {
      const yCount = Store.getAcademics().years.length + 1;
      Modal.open('Add Academic Year', `
        <div class="input-group">
          <label>Year Label</label>
          <input id="modal-year-label" class="input" type="text" value="Year ${yCount}" placeholder="e.g. Year 1" />
        </div>
        <div class="input-group">
          <label>Total Marks</label>
          <input id="modal-year-total" class="input" type="number" inputmode="decimal" value="600" min="1" />
        </div>
        <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:var(--sp-2);">2 terms will be created automatically.</p>
      `, 'Add Year', async () => {
        const label = document.getElementById('modal-year-label').value.trim();
        const total = parseFloat(document.getElementById('modal-year-total').value);
        if (!label) return;
        Store.addYear(label, { totalMarks: total || 600 });
        await Store.saveAcademics();
        Modal.close();
        Toast.show('Year added');
        this._renderYearsList();
        this._populateYearSelects();
      });
    });

    this._populateYearSelects();
    const modYearSel = document.getElementById('mod-year-select');
    const modTermSel = document.getElementById('mod-term-select');
    if (modYearSel) modYearSel.addEventListener('change', () => { this._populateTermSelect(modYearSel.value, 'mod-term-select'); this._renderModulesList(); });
    if (modTermSel) modTermSel.addEventListener('change', () => this._renderModulesList());

    document.getElementById('add-module-btn').addEventListener('click', () => {
      const yearId = modYearSel ? modYearSel.value : null;
      const termId = modTermSel ? modTermSel.value : null;
      if (!yearId || !termId) { Toast.show('Select a year and term first', 'error'); return; }
      Modal.open('Add Module', `
        <div class="input-group">
          <label>Module Name</label>
          <input id="modal-module-name" class="input" type="text" placeholder="e.g. Data Structures" />
        </div>
        <div class="input-group">
          <label>Total Marks</label>
          <input id="modal-module-total" class="input" type="number" inputmode="decimal" value="100" min="1" />
        </div>
        <div class="input-group">
          <label>Obtained Marks <span style="color:var(--text-muted);font-size:var(--text-xs);">(optional)</span></label>
          <input id="modal-module-obtained" class="input" type="number" inputmode="decimal" step="0.5" min="0"
                 placeholder="Leave blank to enter via components later" />
        </div>
      `, 'Add Module', async () => {
        const name   = document.getElementById('modal-module-name').value.trim();
        const total  = parseFloat(document.getElementById('modal-module-total').value);
        const obtStr = document.getElementById('modal-module-obtained').value;
        if (!name) return;
        const opts = { totalMarks: total || 100 };
        if (obtStr !== '') opts.directMark = parseFloat(obtStr);
        Store.addModule(yearId, termId, name, opts);
        await Store.saveAcademics(); Modal.close(); Toast.show('Module added'); this._renderModulesList();
      });

    const subjYearSel = document.getElementById('subj-year-select');

    if (subjTermSel) subjTermSel.addEventListener('change', () => this._renderSubjectsList());

    document.getElementById('add-subject-btn').addEventListener('click', () => {
      const yearId = subjYearSel ? subjYearSel.value : null;
      const termId = subjTermSel ? subjTermSel.value : null;
      if (!yearId || !termId) { Toast.show('Select year and term first', 'error'); return; }

        <div class="input-group">
          <label>Subject Name</label>
          <input id="modal-subj-name" class="input" type="text" placeholder="e.g. Mathematics" />

          <label>Total Marks</label>

          <input id="modal-subj-obtained" class="input" type="number" inputmode="decimal" step="0.5" min="0"

        if (!name) return;

        if (obtStr !== '') opts.directMark = parseFloat(obtStr);
        Store.addSubject(yearId, termId, name, opts);
        await Store.saveAcademics(); Modal.close(); Toast.show('Subject added'); this._renderSubjectsList();
      });

    this._renderCustomQuotes();

      this._renderCustomQuotes();

      <div class="grade-boundary-row">

      <input id="modal-mod-name" class="input" type="text" value="${mod.name}" /></div>

      const name = document.getElementById('modal-mod-name').value.trim();
      if (!name) return;
      mod.name = name; await Store.saveAcademics(); Modal.close(); Toast.show('Module updated'); this._renderModulesList();

    );

  _renderSubjectsList() {

          <div style="display:flex;align-items:center;gap:var(--sp-2);">

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon danger" onclick="PageControllers.settings._deleteSubject('${yearId}','${termId}','${sub.id}','${sub.name}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>

          </div>

  async _editSubject(yearId, termId, subjectId) {
    const sub = Store.getSubject(yearId, termId, subjectId);
    if (!sub) return;
    Modal.open('Edit Subject', `
      <div class="input-group"><label>Subject Name</label>
      <input id="modal-subj-edit-name" class="input" type="text" value="${sub.name}" /></div>
    `, 'Save', async () => {
      const name = document.getElementById('modal-subj-edit-name').value.trim();
      if (!name) return;
      sub.name = name; await Store.saveAcademics(); Modal.close(); Toast.show('Subject updated'); this._renderSubjectsList();
    });

  async _deleteSubject(yearId, termId, subjectId, name) {
    Modal.open('Delete Subject', `<p>Delete <strong>${name}</strong> and all its marks?</p>`,
      'Delete', async () => {
        Store.deleteSubject(yearId, termId, subjectId); await Store.saveAcademics(); Modal.close();
        Toast.show('Subject deleted', 'info'); this._renderSubjectsList();
      }, 'btn-danger'
    );
  },

  _renderCustomQuotes() {
    const container = document.getElementById('custom-quotes-list');
    if (!container) return;
    const { custom } = Quotes.getAll();
    if (custom.length === 0) { container.innerHTML = '<p style="color:var(--text-muted);font-size:var(--text-sm);">No custom quotes yet.</p>'; return; }
    container.innerHTML = custom.map((q, i) => `
      <div style="display:flex;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--border-light);">

        <button class="btn-icon danger" onclick="PageControllers.settings._deleteQuote(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>`).join('');
  },

  async _deleteQuote(index) {
    await Quotes.deleteCustom(index);
    Toast.show('Quote deleted', 'info');
    this._renderCustomQuotes();
  }
};

/* ── MODAL ── */
const Modal = {
  _onConfirm: null,

  open(title, bodyHTML, confirmLabel, onConfirm, confirmClass) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    const confirmBtn = document.getElementById('modal-confirm');
    confirmBtn.textContent = confirmLabel || 'Save';
    confirmBtn.className = `btn ${confirmClass || 'btn-primary'}`;
    this._onConfirm = onConfirm;
    document.getElementById('modal-overlay').classList.add('visible');
    setTimeout(() => {
      const inp = document.querySelector('#modal-body input, #modal-body textarea');
      if (inp) inp.focus();
    }, 100);
  },

  confirm() { if (this._onConfirm) this._onConfirm(); },

  close() {
    document.getElementById('modal-overlay').classList.remove('visible');
    this._onConfirm = null;
  },
};

/* ── TOAST ── */
const Toast = {
  show(message, type = 'success', duration = 2800) {
    const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span class="toast-icon">${icons[type] || '•'}</span><span>${message}</span>`;
    document.getElementById('toast-container').appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
    setTimeout(() => { el.classList.remove('visible'); setTimeout(() => el.remove(), 350); }, duration);
  },
};

/* ── ROUTER (inline templates — no fetch) ── */
const Router = {
  currentParams: {},

  navigate(hash) { window.location.hash = hash; },

  parse(hash) {
    const raw = (hash || '').replace('#/', '').replace('#', '');
    if (!raw) return { page: 'home', params: {} };
    const parts = raw.split('/');
    const params = {};
    const topLevel = ['home', 'settings', 'onboarding'];
    if (topLevel.includes(parts[0])) return { page: parts[0], params };
    let page = 'home';
    if (parts[0] === 'year' && parts[1]) {
      params.yearId = parts[1]; page = 'year';
      if (parts[2] === 'term' && parts[3]) {
        params.termId = parts[3]; page = 'term';
        if ((parts[4] === 'module' || parts[4] === 'subject') && parts[5]) {
          params.type = parts[4]; params.id = parts[5]; page = 'unit';
          if (parts[4] === 'module' && parts[6] === 'subject' && parts[7]) {
            params.moduleId = parts[5]; params.type = 'subject'; params.id = parts[7];
          }
        }
      }
    }
    return { page, params };
  },

  async handle(hash) {
    const { page, params } = this.parse(hash);
    this.currentParams = params;

    const sidebar = document.getElementById('sidebar');
    if (page === 'onboarding') sidebar.classList.add('hidden');
    else sidebar.classList.remove('hidden');

    document.querySelectorAll('.nav-item, .bottom-nav-item[data-route]').forEach(el => {
      el.classList.toggle('active', el.dataset.route === page);
    });

    const templateFn = PageTemplates[page] || PageTemplates.home;
    const content = document.getElementById('page-content');
    content.innerHTML = templateFn();
    content.style.animation = 'none';
    content.offsetHeight;
    content.style.animation = '';

    const ctrl = PageControllers[page];
    if (ctrl) await ctrl.init(params);
  }
};

window.addEventListener('hashchange', () => Router.handle(location.hash));

/* ── SIDEBAR BUILDER ── */
function buildSidebar() {
  const academics = Store.getAcademics();
  const user = Store.getUser();
  if (user && user.name) {
    const nameEl   = document.getElementById('sidebar-user-name');
    const avatarEl = document.getElementById('sidebar-avatar');
    if (nameEl) nameEl.textContent = user.name;
    if (avatarEl) avatarEl.textContent = user.name.slice(0, 1).toUpperCase();
  }
  const container = document.getElementById('sidebar-years');
  if (!container) return;
  if (!academics.years || academics.years.length === 0) {
    container.innerHTML = `<div style="padding:8px 12px;font-size:12px;color:#475569;">No years yet</div>`;
    return;
  }
  container.innerHTML = academics.years.map(year => `
    <div class="sidebar-year-group">
      <div class="sidebar-year-toggle" onclick="toggleSidebarYear('${year.id}', this)" data-year-id="${year.id}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        <span>${year.label}</span>
        <svg class="toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
      <div class="sidebar-year-children" id="year-children-${year.id}">
        ${year.terms.map(term => `
          <div class="sidebar-term-item" onclick="Router.navigate('#/year/${year.id}/term/${term.id}')">${term.label}</div>
        `).join('')}
        <div class="sidebar-term-item" style="color:#475569;font-style:italic;"
             onclick="Router.navigate('#/year/${year.id}')">Overview</div>
      </div>
    </div>
  `).join('');
}

function toggleSidebarYear(yearId, el) {
  el.classList.toggle('open');
  const children = document.getElementById(`year-children-${yearId}`);
  if (children) children.classList.toggle('open');
}

/* ── MOBILE YEAR SHEET ── */
function buildYearSheet() {
  const academics = Store.getAcademics();
  const content   = document.getElementById('year-sheet-content');
  if (!content) return;
  if (!academics.years || academics.years.length === 0) {
    content.innerHTML = `<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--sp-4);">No years yet. Add one in Settings.</p>`;
    return;
  }
  content.innerHTML = academics.years.map(year => `
    <div style="margin-bottom:var(--sp-3);">
      <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:var(--sp-2) 0;">${year.label}</div>
      ${year.terms.map(term => `
        <div class="card card-clickable" style="padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-2);"
             onclick="closeYearSheet();Router.navigate('#/year/${year.id}/term/${term.id}')">
          ${term.label}
        </div>`).join('')}
      <div class="card card-clickable" style="padding:var(--sp-3) var(--sp-4);color:var(--text-secondary);"
           onclick="closeYearSheet();Router.navigate('#/year/${year.id}')">Overview</div>
    </div>
  `).join('');
}

function closeYearSheet() {
  document.getElementById('year-sheet-overlay').classList.remove('visible');
}

/* ── APP INIT ── */
async function init() {
  try {
    await Store.init();
    Theme.apply(Store.getSettings().theme);
    buildSidebar();
    Store.on('academics:changed', () => { buildSidebar(); buildYearSheet(); });
    Store.on('user:changed', buildSidebar);

    document.getElementById('modal-confirm').addEventListener('click', () => Modal.confirm());
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) Modal.close(); });

    const bnYears = document.getElementById('bn-years');
    if (bnYears) {
      bnYears.addEventListener('click', () => {
        buildYearSheet();
        document.getElementById('year-sheet-overlay').classList.add('visible');
      });
    }
    document.getElementById('year-sheet-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeYearSheet();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    const user = Store.getUser();
    if (!user || !user.name) {
      Router.navigate('#/onboarding');
    } else if (!location.hash || location.hash === '#') {
      Router.navigate('#/home');
    } else {
      Router.handle(location.hash);
    }
  } catch (err) {
    console.error('Init error:', err);
    document.getElementById('page-content').innerHTML = `
      <div class="loading-screen">
        <p style="color:var(--color-danger)">Failed to initialize: ${err.message}</p>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
